name: Build, Scan & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build container image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: CrowdStrike FCS Image Scan
        id: fcs-scan
        uses: crowdstrike/fcs-action@v4
        with:
          falcon_client_id: ${{ vars.FALCON_CLIENT_ID }}
          falcon_region: ${{ vars.FALCON_REGION }}
          scan_type: image
          image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          minimum_severity: high
          vuln_fixable_only: true
          report_formats: json
          output_path: ./fcs-results.json
        env:
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}

      - name: Gate - block push on scan findings
        if: always()
        run: |
          if [ ! -f "./fcs-results.json" ]; then
            echo "::warning::No report file found"
            exit 0
          fi

          # The scan uses vuln_fixable_only + minimum_severity: high, so
          # VulnerabilitiesSummary only counts fixable HIGH+ vulns
          HIGH=$(jq '.VulnerabilitiesSummary.severities.high // 0' ./fcs-results.json)
          CRITICAL=$(jq '.VulnerabilitiesSummary.severities.critical // 0' ./fcs-results.json)
          TOTAL=$((HIGH + CRITICAL))

          echo "Fixable vulnerabilities — HIGH: $HIGH, CRITICAL: $CRITICAL"

          if [ "$TOTAL" -gt "0" ]; then
            echo "::error::Image has $TOTAL fixable HIGH/CRITICAL vulnerabilities. Blocking push."
            echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
            echo "**BLOCKED:** $TOTAL fixable HIGH/CRITICAL vulnerabilities (HIGH: $HIGH, CRITICAL: $CRITICAL)" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "No fixable HIGH/CRITICAL vulnerabilities. Image is clean."
          fi

      - name: Log in to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:latest
