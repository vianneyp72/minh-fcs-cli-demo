name: Build, Scan & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build container image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: CrowdStrike FCS Image Scan
        id: fcs-scan
        uses: crowdstrike/fcs-action@v4
        with:
          falcon_client_id: ${{ vars.FALCON_CLIENT_ID }}
          falcon_region: ${{ vars.FALCON_REGION }}
          scan_type: image
          image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          fail_on: high
          policy_rule: fail
          report_formats: json
          output_path: ./fcs-results.json
        env:
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}

      - name: Locate report
        if: always()
        run: |
          if [ -f "./fcs-results.json" ]; then
            echo "report_found=true" >> $GITHUB_ENV
          else
            echo "report_found=false" >> $GITHUB_ENV
            echo "::warning::No report file found"
          fi

      - name: Gate - fail on high or critical vulnerabilities
        if: env.report_found == 'true'
        run: |
          # Count vulnerabilities at HIGH or CRITICAL CrowdStrike severity
          HIGH_COUNT=$(jq '[.vulnerabilities[]? | select(.severity == "HIGH" or .severity == "CRITICAL")] | length' ./fcs-results.json 2>/dev/null || echo "0")

          # Fallback: check nested structure
          if [ "$HIGH_COUNT" = "0" ]; then
            HIGH_COUNT=$(jq '[.. | objects | select(.severity? == "HIGH" or .severity? == "CRITICAL")] | length' ./fcs-results.json 2>/dev/null || echo "0")
          fi

          echo "Found $HIGH_COUNT HIGH/CRITICAL vulnerabilities"

          if [ "$HIGH_COUNT" -gt "0" ]; then
            echo "::error::Image has $HIGH_COUNT HIGH/CRITICAL vulnerabilities. Blocking push."
            echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
            echo "**BLOCKED:** $HIGH_COUNT HIGH/CRITICAL vulnerabilities found" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "No HIGH/CRITICAL vulnerabilities found. Image is clear."
          fi

      - name: Log in to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:latest
