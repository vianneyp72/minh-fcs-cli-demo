name: Build, Scan & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build container image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: CrowdStrike FCS Image Scan
        id: fcs-scan
        uses: crowdstrike/fcs-action@v4
        with:
          falcon_client_id: ${{ vars.FALCON_CLIENT_ID }}
          falcon_region: ${{ vars.FALCON_REGION }}
          scan_type: image
          image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          fail_on: high
          policy_rule: fail
          report_formats: json
          output_path: ./fcs-results.json
        env:
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}

      - name: Locate report
        if: always()
        run: |
          if [ -f "./fcs-results.json" ]; then
            echo "report_found=true" >> $GITHUB_ENV
          else
            echo "report_found=false" >> $GITHUB_ENV
            echo "::warning::No report file found"
          fi

      - name: Debug - inspect JSON structure
        if: env.report_found == 'true'
        run: |
          echo "=== Vulnerabilities array - first entry keys ==="
          jq '.Vulnerabilities[0] | keys' ./fcs-results.json 2>/dev/null || true

          echo ""
          echo "=== Vulnerabilities[0] sample (truncated) ==="
          jq '.Vulnerabilities[0] | del(.description, .references)' ./fcs-results.json 2>/dev/null || true

          echo ""
          echo "=== Packages array - first entry keys ==="
          jq '.Packages[0] | keys' ./fcs-results.json 2>/dev/null || true

          echo ""
          echo "=== Packages[0] sample (truncated) ==="
          jq '.Packages[0] | del(.Vulnerabilities)' ./fcs-results.json 2>/dev/null || true

          echo ""
          echo "=== Packages[0].Vulnerabilities[0] ==="
          jq '.Packages[0].Vulnerabilities[0]' ./fcs-results.json 2>/dev/null || true

          echo ""
          echo "=== ApplicationPackages[0] keys ==="
          jq '.ApplicationPackages[0] | keys' ./fcs-results.json 2>/dev/null || true

          echo ""
          echo "=== ApplicationPackages[0] sample (truncated) ==="
          jq '.ApplicationPackages[0] | del(.Vulnerabilities)' ./fcs-results.json 2>/dev/null || true

          echo ""
          echo "=== ApplicationPackages[0].Vulnerabilities[0] ==="
          jq '.ApplicationPackages[0].Vulnerabilities[0]' ./fcs-results.json 2>/dev/null || true

          echo ""
          echo "=== Find werkzeug in ApplicationPackages ==="
          jq '[.ApplicationPackages[] | select(.package_name_version? | test("werkzeug"; "i"))] | .[0]' ./fcs-results.json 2>/dev/null || true
          jq '[.ApplicationPackages[] | select(.PackageSource? | test("werkzeug"; "i"))] | .[0] | keys' ./fcs-results.json 2>/dev/null || true

      - name: Gate - fail on fixable high or critical vulnerabilities
        if: env.report_found == 'true'
        run: |
          echo "=== Gate check (placeholder - fixing after debug) ==="
          echo "Deliberately failing to inspect debug output"
          exit 1

      - name: Log in to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:latest
